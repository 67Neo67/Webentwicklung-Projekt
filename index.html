<!-- ================= index.html ================= -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mini Reddit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>Mini Reddit</header>

<div class="container">
  <h2>Posts</h2>

  <!-- Button öffnet Popup -->
  <button id="openModalBtn" class="create-btn">+ Neuer Post</button>

  <div id="posts"></div>
</div>

<!-- Popup Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2>Neuer Post</h2>
    <input type="text" id="title" placeholder="Titel">
    <textarea id="content" placeholder="Inhalt"></textarea>
    <input type="text" id="author" placeholder="Autor">

    <div class="modal-actions">
      <button id="createBtn">Erstellen</button>
      <button id="closeModalBtn">Abbrechen</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
